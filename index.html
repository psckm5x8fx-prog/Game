

<!DOCTYPE html>
<html>
<head>
    <title>게임 점수 계산</title>
</head>
<body>

<h2>게임 점수 계산 (코인 포함)</h2>

이름: <input type="text" id="name"><br>
돈: <input type="number" id="money"><br>
코인: <input type="number" id="coin"><br><br>

코인 환산 비율 (1코인당 돈): 
<input type="number" id="rate" value="10"><br><br>

<button onclick="addPlayer()">추가</button>
<button onclick="findWinner()">1등 찾기</button>

<h3>참가자 목록</h3>
<ul id="list"></ul>

<h2 id="winner"></h2>

<script>
let players = [];

function addPlayer() {
    let name = document.getElementById("name").value;
    let money = Number(document.getElementById("money").value);
    let coin = Number(document.getElementById("coin").value);
    let rate = Number(document.getElementById("rate").value);

    let total = money + (coin * rate);

    players.push({name, total});

    let li = document.createElement("li");
    li.innerText = name + " : " + total;
    document.getElementById("list").appendChild(li);
}

function findWinner() {
    let max = 0;
    let winner = "";

    for (let p of players) {
        if (p.total > max) {
            max = p.total;
            winner = p.name;
        }
    }

    document.getElementById("winner").innerText = 
        "🏆 1등: " + winner + " (" + max + ")";
}
</script>

</body>
</html>
